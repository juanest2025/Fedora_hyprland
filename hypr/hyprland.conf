################################################################################
# HYPRLAND CONFIG 
################################################################################

################################################################################
# REINICIAR CONFIG
###############################################################################
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod SHIFT, W, exec, pkill waybar && waybar &
bind = $mainMod SHIFT, P, exec, pkill hyprpaper && hyprpaper &
bind = $mainMod SHIFT, Q, exec, hyprctl dispatch exit

################
### VARIABLES ###
################

$mainMod = SUPER
$menu = wofi --show drun
$vlc = env GDK_BACKEND=x11 QT_QPA_PLATFORM=xcb vlc

################
### MONITOR ###
################

monitor=,preferred,auto,auto

################
### AUTOSTART ###
################

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_RUNTIME_DIR XDG_CURRENT_DESKTOP=hyprland
exec-once = systemctl --user enable --now pipewire pipewire-pulse
exec-once = waybar
exec-once = mako
exec-once = nm-applet
exec-once = wl-paste --watch cliphist store
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = hyprpaper

#################################################################
# FILTO DE LUZ AZUL
#################################################################
#exec-once = gammastep -O 3500
# Toggle luz azul
#bind = $mainMod, N, exec, pkill gammastep || gammastep -O 3500
#exec-once = sleep 3 && gammastep -O 3500
#exec-once = sh -c "sleep 3 && /usr/bin/gammastep -O 3500"
exec-once = sh -c "sleep 5 && WAYLAND_DISPLAY=$WAYLAND_DISPLAY /usr/bin/gammastep -O 3500"

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

################
### APARIENCIA ###
################

general {
    gaps_in = 1
    gaps_out = 2
    border_size = 0
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
    }

    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

####################################################
# ANIMACIONES
###################################################
animations {
  enabled = true
  animation = windows,1,2,default
  animation = fade,1,2,default
  animation = workspaces,1,2,default
}

#animations {
# enabled = false
#}

################################################
# layout y trackpad
#################################################

input {
    kb_layout = latam
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        middle_button_emulation = true
    }
}

################
### WORKSPACES ###
################

# Numeros
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mod5 homerow
bind = Mod5, A, workspace, 1
bind = Mod5, S, workspace, 2
bind = Mod5, D, workspace, 3
bind = Mod5, F, workspace, 4
bind = Mod5, G, workspace, 5
bind = Mod5, H, workspace, 6
bind = Mod5, J, workspace, 7
bind = Mod5, K, workspace, 8
bind = Mod5, L, workspace, 9

################
### MOVER VENTANAS ###
################

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

################
### APPS ###
################

# terminal
bind = $mainMod, Return, exec, kitty  
# filemanager
bind = $mainMod, E, exec, nemo 
# telegram
bind = $mainMod, T, exec, flatpak run org.telegram.desktop
# wofi
bind = ALT , Space , exec, wofi --show drun
# vlc
bind = $mainMod, V, exec, $vlc
# Brave
bind = $mainMod, B, exec, brave-browser
# google drive script
bind = $mainMod, X, exec, ~/.config/obsidian-script/start.sh
# Obsidian (Flatpak)
bind = ALT SHIFT, O, exec, flatpak run md.obsidian.Obsidian
# Apagar script
bind = ALT SHIFT, M, exec, ~/apagar.sh
# WhatsApp Web
bind = $mainMod, W, exec, brave-browser --app=https://web.whatsapp.com
# Nemo
bind = $mainMod, E, exec, nemo
# Google Drive Web
bind = $mainMod, D, exec, brave-browser --app=https://drive.google.com/drive/my-drive
# Chrome
bind = $mainMod, C, exec, google-chrome-stable
# Wofi (launcher)
bind = ALT, Space, exec, wofi --show drun
# Telegram
bind = $mainMod, T, exec, flatpak run org.telegram.desktop

# INTERRUPTOR DE WAYBAR
bind = ALT SHIFT, J, exec, ~/.config/hypr/scripts/toggle.sh

### WIFI SCRIPTS

# Reiniciar / mejorar WiFi
bind = ALT SHIFT, L, exec, ~/.config/hypr/scripts/mejorar.wifi.sh

# Conectar a tu red de casa
bind = ALT SHIFT, K, exec, ~/.config/hypr/scripts/wifi.sh

################
### VOLUMEN (Ctrl + Shift + Flechas)
################

bind = CTRL SHIFT, Right, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = CTRL SHIFT, Left,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = CTRL SHIFT, M,     exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle


################
### BRILLO (Ctrl + Shift + Flechas)
################

bind = CTRL SHIFT, Up,   exec, brightnessctl set +2%
bind = CTRL SHIFT, Down, exec, brightnessctl set 2%-

### LOCK / LOGOUT
# Bloquear pantalla
bind = CTRL SHIFT, L, exec, swaylock
# Menú de salida
bind = CTRL SHIFT, E, exec, wlogout

################
### VENTANAS ###
################

bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod, Space, togglefloating

################
### FOCUS (VIM STYLE) ###
################

bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

################
### RESIZE ###
################

bind = $mainMod SHIFT, H, resizeactive, -20 0
bind = $mainMod SHIFT, L, resizeactive, 20 0
bind = $mainMod SHIFT, K, resizeactive, 0 -20
bind = $mainMod SHIFT, J, resizeactive, 0 20

################
### VOLUMEN ###
################

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

################
### BRILLO ###
################

bindel = ,XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

################
### SCREENSHOTS ###
################

bind = ,Print, exec, flameshot gui
bind = SHIFT,Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot.png
# Pantalla completa → clipboard
bind = CTRL, Print, exec, grim - | wl-copy

# Área → clipboard
bind = CTRL SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy


################
### SCRATCHPAD ###
################

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

################
### MOUSE ###
################

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
